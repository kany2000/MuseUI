name: Feature request
description: Suggest an improvement or new capability for MuseUI
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like MuseUI to support.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI designer
        - Media studio
        - Game studio
        - API settings
        - Canvas and artboards
        - Project/history storage
        - Documentation
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention workarounds or different designs you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, mockups, or examples if useful. Do not include secrets.
